<!DOCTYPE html>
<html lang="ru" class="bg-[#04061B]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Полина Мигранова | Графический дизайнер</title>
  <meta name="description" content="Портфолио графического дизайнера Полины Миграновой">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#04061B', secondary: '#3624A6' },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .shimmer {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .modal-enter { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .slide-fade { transition: opacity 0.3s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3624A6; border-radius: 3px; }
  </style>
</head>
<body class="bg-primary text-white min-h-screen font-sans">

<div x-data="portfolio()">

  <!-- Header -->
  <header class="pt-16 pb-12 px-6 text-center">
    <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-3" style="font-family: Georgia, serif;">Полина</h1>
    <p class="text-2xl md:text-3xl font-light text-gray-400 mb-2" style="font-family: Georgia, serif;">Мигранова</p>
    <p class="text-lg text-gray-500 font-light tracking-widest uppercase">графический дизайнер</p>
  </header>

  <!-- Portfolio Grid -->
  <main class="max-w-6xl mx-auto px-4 pb-20">
    <h2 class="text-3xl md:text-5xl font-bold mb-10 text-center" style="font-family: Georgia, serif;">Портфолио</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-7">
      <template x-for="project in projects" :key="project.id">
        <button class="group text-left w-full" @click="openProject(project)">
          <div class="relative overflow-hidden rounded-[1.25rem] md:rounded-[1.875rem] bg-[#0a0d2e] border border-white/10 hover:border-white/20 transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl hover:shadow-secondary/20">
            <div class="aspect-[4/3] overflow-hidden">
              <img :src="project.card" :alt="project.title"
                   class="w-full h-full object-cover group-hover:scale-[1.05] transition-transform duration-500" loading="lazy">
            </div>
            <div class="p-5 md:p-6">
              <h3 class="text-xl md:text-2xl font-semibold mb-2" x-text="project.title"></h3>
              <p class="text-gray-400 text-sm md:text-base" x-show="project.description" x-text="project.description"></p>
            </div>
          </div>
        </button>
      </template>
    </div>
  </main>

  <!-- Contact -->
  <section class="py-16 text-center">
    <a href="https://vk.me/dizaynponauke"
       class="inline-flex items-center justify-center px-16 py-5 rounded-full bg-white text-secondary text-xl md:text-2xl font-medium hover:bg-gradient-to-r hover:from-[#1C1257] hover:to-[#312098] hover:text-white transition-all duration-300">
      связаться
    </a>
  </section>

  <!-- Modal -->
  <template x-if="modal">
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm"
         @click.self="closeModal()" @keydown.escape.window="closeModal()">
      <div class="modal-enter bg-[#0a0d2e] rounded-[1.25rem] md:rounded-[1.875rem] max-w-5xl w-full mx-4 max-h-[90vh] overflow-y-auto relative shadow-2xl border border-white/10">
        <!-- Close -->
        <button @click="closeModal()"
                class="absolute top-4 right-4 z-10 w-10 h-10 md:w-12 md:h-12 rounded-full bg-black/40 backdrop-blur hover:bg-white/20 flex items-center justify-center transition-colors">
          <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>

        <div class="p-6 md:p-10">
          <!-- Title -->
          <h3 class="text-3xl md:text-5xl font-bold mb-2" style="font-family: Georgia, serif;" x-text="current.title"></h3>
          <p class="text-gray-400 text-lg md:text-xl font-light mb-1" x-show="current.description" x-text="current.description"></p>
          <p class="text-sm text-gray-500 mb-8" x-show="current.audience">
            <span class="font-medium text-gray-400">Целевая аудитория:</span> <span x-text="current.audience"></span>
          </p>

          <!-- Slider -->
          <div class="relative">
            <div class="rounded-xl overflow-hidden bg-primary mb-4">
              <img :src="current.slides[slide].image" :alt="current.title"
                   class="w-full slide-fade" :key="slide">
            </div>

            <!-- Navigation -->
            <div class="flex items-center justify-between mb-6" x-show="current.slides.length > 1">
              <button @click="slide = (slide - 1 + current.slides.length) % current.slides.length"
                      class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
              </button>
              <div class="flex gap-2">
                <template x-for="(s, i) in current.slides" :key="i">
                  <button @click="slide = i"
                          :class="slide === i ? 'bg-white w-6' : 'bg-white/30 w-2.5'"
                          class="h-2.5 rounded-full transition-all duration-300"></button>
                </template>
              </div>
              <button @click="slide = (slide + 1) % current.slides.length"
                      class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
              </button>
            </div>

            <!-- Task / Solution -->
            <div x-show="current.slides[slide].task" class="grid md:grid-cols-2 gap-4">
              <div class="bg-white/5 rounded-xl p-5">
                <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Задача</h4>
                <p class="text-gray-300 text-sm leading-relaxed" x-text="current.slides[slide].task"></p>
              </div>
              <div class="bg-white/5 rounded-xl p-5">
                <h4 class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Решение</h4>
                <p class="text-gray-300 text-sm leading-relaxed" x-text="current.slides[slide].solution"></p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

</div>

<!-- Footer -->
<footer class="py-8 text-center border-t border-white/5">
  <p class="text-gray-500">Полина Мигранова</p>
</footer>

<script>
function portfolio() {
  return {
    projects: [{"id": "project1", "title": "НИТИ", "description": "Группа проектов по управлению современным образованием", "audience": "менеджеры образования, управленцы, преимущественно женщины старше 40", "card": "images/threads.jpg", "slides": [{"image": "images/niti/niti1.jpg", "task": "Ребрендинг образовательного продукта с акцентом на женственность, лидерство и профессиональный рост", "solution": "Синяя цветовая палитра с градиентами создаёт ощущение серьёзного подхода к вызовам современного образования"}, {"image": "images/niti/niti2.jpg", "task": "Создание системы визуальной идентификации для образовательной платформы", "solution": "Фирменный стиль с акцентом на профессионализм и доступность образования"}, {"image": "images/niti/niti3.jpg", "task": "Разработка мерча для мероприятия", "solution": "Сувенирная продукция в соответствии с фирменным стилем проекта"}, {"image": "images/niti/niti4.jpg", "task": "Создание SMM-материалов (карточек)", "solution": "Расстановка акцентов для выделения существенной информации"}, {"image": "images/niti/niti5.jpg", "task": "Создание SMM-материалов (карточек)", "solution": "Сохранение общих моментов и введение разнообразия для привлечения внимания"}]}, {"id": "project2", "title": "КОДИИМ", "description": "Проект по искусственному интеллекту, обучению программированию и созданию нейронных сетей", "audience": "учащиеся 6-11 классов, интересующиеся программированию и ИИ", "card": "images/code.jpg", "slides": [{"image": "images/code/code1.jpg", "task": "Оформление ивента — Московского городского конкурса для школьников в области ИИ", "solution": "Современная подача, цветовые отличия в бейджах, палитра отражает технологичность бренда"}, {"image": "images/code/code2.jpg", "task": "Создать уникальный и запоминающийся мерч для буткемпа по ИИ", "solution": "Смыслы мероприятия представлены как код в программировании"}, {"image": "images/code/code3.jpg", "task": "Редизайн SMM-материалов", "solution": "Разнообразие цветов, активное использование нейросетей для генерации иллюстраций"}, {"image": "images/code/code4.jpg", "task": "Редизайн SMM-материалов", "solution": "Использование нейросетей для генерации персонажей и иллюстраций"}]}, {"id": "project3", "title": "День физики", "description": "Мероприятие 17 сентября 2023 года в день рождения Циолковского, 22 города", "audience": "старшеклассники, интересующиеся наукой, выбирающие будущую профессию", "card": "images/day.jpg", "slides": [{"image": "images/fizics/fizics1.jpg", "task": "Разработать карточки для игры «Технообмен» в айдентике бренда", "solution": "Биографии российских и советских учёных, надпись «НАУКА=ТЕОРИЯ+ПРАКТИКА», цитаты о профессии"}, {"image": "images/fizics/fizics2.jpg", "task": "Разработать макет открыток с российскими физиками", "solution": "Портреты физиков с биографической информацией в фирменном стиле мероприятия"}, {"image": "images/fizics/fizics3.jpg", "task": "Разработать карточки для игры с новыми цветами", "solution": "Легко читаемые макеты с указанием темы, года, ранжирования и категории по цвету"}]}, {"id": "project4", "title": "Презентации", "description": "Дизайн презентаций для образовательных и научных проектов", "audience": "", "card": "images/presentation.jpg", "slides": [{"image": "images/presentations/0.jpg", "task": "", "solution": ""}, {"image": "images/presentations/1.jpg", "task": "", "solution": ""}, {"image": "images/presentations/2.jpg", "task": "", "solution": ""}, {"image": "images/presentations/3.jpg", "task": "", "solution": ""}, {"image": "images/presentations/4.jpg", "task": "", "solution": ""}, {"image": "images/presentations/5.jpg", "task": "", "solution": ""}, {"image": "images/presentations/6.jpg", "task": "", "solution": ""}, {"image": "images/presentations/7.jpg", "task": "", "solution": ""}, {"image": "images/presentations/8.jpg", "task": "", "solution": ""}]}],
    modal: false,
    current: null,
    slide: 0,
    openProject(p) {
      this.current = p;
      this.slide = 0;
      this.modal = true;
      document.body.style.overflow = 'hidden';
    },
    closeModal() {
      this.modal = false;
      document.body.style.overflow = '';
    }
  }
}
</script>

</body>
</html>
