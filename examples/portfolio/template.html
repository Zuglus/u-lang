<!DOCTYPE html>
<html lang="ru" class="bg-[#04061b]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .shimmer {
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .modal-backdrop { backdrop-filter: blur(8px); }
    .slide-img { transition: opacity 0.4s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body class="bg-[#04061b] text-white min-h-screen">

  <div x-data="portfolio()">

    <!-- Header -->
    <header class="py-8 px-6 text-center">
      <h1 class="text-4xl font-bold tracking-wide mb-2" style="font-family: serif;">{{TITLE}}</h1>
      <p class="text-gray-400 text-lg">{{DESCRIPTION}}</p>
    </header>

    <!-- Portfolio Grid -->
    <main class="max-w-6xl mx-auto px-4 pb-16">
      <h2 class="text-2xl font-semibold mb-8 text-center text-gray-200">&#1055;&#1086;&#1088;&#1090;&#1092;&#1086;&#1083;&#1080;&#1086;</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <template x-for="project in projects" :key="project.id">
          <div class="group cursor-pointer" x-on:click="openProject(project)">
            <div class="relative overflow-hidden rounded-2xl bg-[#0a0d2e] border border-white/10 hover:border-white/20 transition-all duration-300 hover:-translate-y-2 hover:shadow-2xl hover:shadow-purple-900/20">
              <div class="aspect-[4/3] overflow-hidden">
                <img :src="project.slides[0].image" :alt="project.title" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
              </div>
              <div class="p-5">
                <h3 class="text-xl font-semibold mb-2" x-text="project.title"></h3>
                <p class="text-gray-400 text-sm" x-show="project.description" x-text="project.description"></p>
              </div>
            </div>
          </div>
        </template>
      </div>
    </main>

    <!-- Modal -->
    <template x-if="modal">
      <div class="fixed inset-0 z-50 flex items-center justify-center modal-backdrop bg-black/80"
           x-on:click.self="closeModal()" x-on:keydown.escape.window="closeModal()">
        <div class="bg-[#0a0d2e] rounded-2xl max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto relative shadow-2xl border border-white/10">
          <button x-on:click="closeModal()"
                  class="absolute top-4 right-4 z-10 w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
          <div class="p-6 md:p-8">
            <h3 class="text-2xl font-bold mb-2" x-text="current.title"></h3>
            <p class="text-gray-400 mb-1" x-text="current.description"></p>
            <p class="text-sm text-gray-500 mb-6" x-show="current.audience" x-text="'\u0426\u0410: ' + current.audience"></p>
            <div class="relative">
              <div class="rounded-xl overflow-hidden bg-[#04061b] mb-4">
                <img :src="current.slides[slide].image" class="w-full slide-img" :alt="current.title">
              </div>
              <div class="flex items-center justify-between mb-4" x-show="current.slides.length > 1">
                <button x-on:click="slide = (slide - 1 + current.slides.length) % current.slides.length"
                        class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <div class="flex gap-2">
                  <template x-for="(s, i) in current.slides" :key="i">
                    <button x-on:click="slide = i"
                            :class="slide === i ? 'bg-white' : 'bg-white/30'"
                            class="w-2.5 h-2.5 rounded-full transition-colors"></button>
                  </template>
                </div>
                <button x-on:click="slide = (slide + 1) % current.slides.length"
                        class="w-10 h-10 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
              </div>
              <div x-show="current.slides[slide].task" class="space-y-3">
                <div class="bg-white/5 rounded-xl p-4">
                  <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">&#1047;&#1072;&#1076;&#1072;&#1095;&#1072;</h4>
                  <p class="text-gray-300 text-sm" x-text="current.slides[slide].task"></p>
                </div>
                <div class="bg-white/5 rounded-xl p-4">
                  <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">&#1056;&#1077;&#1096;&#1077;&#1085;&#1080;&#1077;</h4>
                  <p class="text-gray-300 text-sm" x-text="current.slides[slide].solution"></p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

  </div>

  <footer class="py-8 text-center text-gray-500 text-sm border-t border-white/5">
    <p>&copy; 2024 &#1055;&#1086;&#1083;&#1080;&#1085;&#1072; &#1052;&#1080;&#1075;&#1088;&#1072;&#1085;&#1086;&#1074;&#1072;</p>
  </footer>

  <script>
    function portfolio() {
      return {
        projects: {{PROJECTS}},
        modal: false,
        current: null,
        slide: 0,
        openProject(p) { this.current = p; this.slide = 0; this.modal = true; document.body.style.overflow = 'hidden'; },
        closeModal() { this.modal = false; document.body.style.overflow = ''; }
      }
    }
  </script>

</body>
</html>
