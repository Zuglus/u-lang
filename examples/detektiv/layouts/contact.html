<!-- HEADER -->
<section class="relative overflow-hidden text-white pt-40 pb-12 bg-gradient-header">
  <div class="relative z-10 max-w-3xl mx-auto px-6 text-center">
    <h1 class="font-display text-display-sm md:text-display-md font-bold text-white mb-4">{{ header.title.ru }}</h1>
    <p class="text-white/70 text-lg">{{ header.subtitle.ru }}</p>
  </div>
</section>

<!-- CONTACT GRID -->
<section class="py-16 bg-white">
  <div class="max-w-4xl mx-auto px-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- PHONE -->
      <div class="bg-primary-600 text-white rounded-2xl p-8 md:col-span-2">
        <h2 class="font-display text-2xl font-bold mb-2">{{ phone.title.ru }}</h2>
        <a href="tel:+79150010025" class="text-3xl font-bold hover:text-primary-200 transition-colors">+7 (915) 001-00-25</a>
        <p class="text-primary-200 mt-2 text-sm">{{ phone.subtitle.ru }}</p>
      </div>
      <!-- ADDRESS -->
      <div class="bg-secondary-50 rounded-2xl p-8 border border-secondary-100">
        <h3 class="font-display text-lg font-bold text-secondary-900 mb-3">{{ address_section.title.ru }}</h3>
        <p class="text-secondary-600">Проспект Мира, 27, Москва</p>
      </div>
      <!-- EMAIL -->
      <div class="bg-secondary-50 rounded-2xl p-8 border border-secondary-100">
        <h3 class="font-display text-lg font-bold text-secondary-900 mb-3">E-mail</h3>
        <a href="mailto:detectivegroznyi@gmail.com" class="text-primary-600 hover:text-primary-700">detectivegroznyi@gmail.com</a>
      </div>
    </div>

    <!-- MESSENGERS -->
    <div class="mt-8">
      <h3 class="font-display text-xl font-bold text-secondary-900 mb-4 text-center">{{ messengers.title.ru }}</h3>
      <div class="flex flex-wrap justify-center gap-4">
        <a href="https://t.me/+79150010025" class="flex flex-col items-center p-4 bg-secondary-50 rounded-xl hover:bg-secondary-100 transition-colors min-w-[100px] border border-secondary-100">
          <span class="text-2xl mb-1">&#9993;</span><span class="text-sm text-secondary-700">Telegram</span>
        </a>
        <a href="https://wa.me/79150010025" class="flex flex-col items-center p-4 bg-secondary-50 rounded-xl hover:bg-secondary-100 transition-colors min-w-[100px] border border-secondary-100">
          <span class="text-2xl mb-1">&#128172;</span><span class="text-sm text-secondary-700">WhatsApp</span>
        </a>
        <a href="https://signal.me/#p/+79150010025" class="flex flex-col items-center p-4 bg-secondary-50 rounded-xl hover:bg-secondary-100 transition-colors min-w-[100px] border border-secondary-100">
          <span class="text-2xl mb-1">&#128274;</span><span class="text-sm text-secondary-700">Signal</span>
        </a>
      </div>
    </div>
  </div>
</section>

<!-- DISCLAIMER -->
<section class="py-8 bg-secondary-50">
  <div class="max-w-3xl mx-auto px-6 text-center text-secondary-500 text-sm">
    {{ disclaimer.text.ru }}
  </div>
</section>
