<!-- HEADER -->
<section class="relative overflow-hidden text-white pt-40 pb-12 bg-gradient-header">
  <div class="relative z-10 max-w-3xl mx-auto px-6 text-center">
    <h1 class="font-display text-display-sm md:text-display-md font-bold text-white mb-4">{{ header.title.ru }}</h1>
    <p class="text-white/70 text-lg">{{ header.subtitle.ru }}</p>
  </div>
</section>

<!-- FOUNDER -->
<section class="py-16 bg-white">
  <div class="max-w-4xl mx-auto px-6">
    <div class="flex flex-col md:flex-row items-center gap-8">
      <img src="/founder.png" alt="Основатель" class="w-48 h-48 rounded-2xl object-cover shadow-lg">
      <div>
        <h2 class="font-display text-2xl font-bold text-secondary-900 mb-4">{{ founder.name.ru }}</h2>
        <p class="text-secondary-600 leading-relaxed">{{ founder.description.ru }}</p>
      </div>
    </div>
  </div>
</section>

<!-- TIMELINE -->
<section class="py-16 bg-secondary-50">
  <div class="max-w-4xl mx-auto px-6">
    <h2 class="font-display text-heading-lg font-bold text-secondary-900 mb-8 text-center">{{ timeline.title.ru }}</h2>
    <div class="space-y-6">
      {% for item in timeline.items %}
      <div class="flex gap-4 items-start">
        <div class="w-16 h-16 rounded-xl bg-primary-100 flex items-center justify-center text-primary-700 font-bold flex-shrink-0">{{ item.year }}</div>
        <div>
          <h3 class="font-bold text-secondary-900">{{ item.title.ru }}</h3>
          <p class="text-secondary-600 text-sm">{{ item.text.ru }}</p>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

<!-- CTA -->
<section class="py-16 bg-white">
  <div class="max-w-3xl mx-auto px-6 text-center">
    <a href="/contact/" class="inline-flex items-center px-8 py-4 bg-primary-600 hover:bg-primary-700 text-white font-semibold rounded-xl text-lg transition-colors">Связаться с нами</a>
  </div>
</section>
