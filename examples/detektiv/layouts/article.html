<!-- HEADER -->
<section class="relative overflow-hidden text-white pt-40 pb-12 bg-gradient-header">
  <div class="relative z-10 max-w-3xl mx-auto px-6 text-center">
    <div class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium mb-4 bg-primary-500/30 border border-primary-400/40">
      <span class="text-white/80">Реальное дело из практики</span>
    </div>
    <h1 class="font-display text-heading-lg md:text-display-sm font-bold text-white mb-8 leading-tight">{{ title }}</h1>
  </div>
</section>

<!-- CONTENT -->
<section class="py-12">
  <div class="max-w-3xl mx-auto px-6">
    <div class="bg-white rounded-2xl border border-secondary-200 p-6 md:p-20 shadow-sm">
      <article class="prose prose-base max-w-[720px] mx-auto prose-headings:font-display prose-headings:text-secondary-900 prose-p:text-secondary-700 prose-p:leading-[1.7] prose-p:mb-10 prose-strong:text-secondary-900">
        {{ body }}
      </article>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="pb-16">
  <div class="max-w-3xl mx-auto px-6">
    <div class="relative overflow-hidden rounded-2xl p-8 text-center bg-gradient-header">
      <div class="relative z-10">
        <h3 class="text-xl font-display font-bold text-white mb-3">Нужна помощь детектива?</h3>
        <p class="text-sm text-white/80 mb-6 max-w-xl mx-auto">Каждая ситуация уникальна. Получите конфиденциальную консультацию от профессионалов.</p>
        <a href="/contact/" class="inline-flex items-center px-6 py-3 bg-white text-primary-700 font-semibold rounded-xl text-base hover:bg-primary-50 transition-colors">Связаться с нами</a>
      </div>
    </div>
  </div>
</section>
